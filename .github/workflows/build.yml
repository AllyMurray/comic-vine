name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x
          - 24.x
    env:
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Test Build Artifacts
        run: pnpm run test:build

      - name: Verify generated code is up to date
        if: matrix.node-version == '24.x'
        run: |
          pnpm run sdk:generate
          pnpm run format
          git diff --exit-code -- src/ samples/code-comments/ || {
            echo "::error::Generated code is out of date. Run 'pnpm sdk:generate && pnpm format' and commit the result."
            exit 1
          }
