name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Test Build Artifacts
        run: pnpm run test:build

      - name: Verify generated code is up to date
        run: |
          pnpm run sdk:generate
          pnpm run format
          git diff --exit-code -- src/ samples/code-comments/ || {
            echo "::error::Generated code is out of date. Run 'pnpm sdk:generate && pnpm format' and commit the result."
            exit 1
          }
